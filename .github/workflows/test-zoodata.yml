name: Test zoodata.py

on:
  pull_request:
    branches: [main]
    paths:
      - 'zoodata/scripts/zoodata.py'
      - 'amazon-*/scripts/zoodata.py'
      - 'tests/test_zoodata*.py'
  push:
    branches: [main]
    paths:
      - 'zoodata/scripts/zoodata.py'
      - 'tests/test_zoodata*.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # No dependencies needed — stdlib only

      - name: Run test suite
        run: python tests/test_zoodata.py

      - name: Run page-arg regression tests
        run: python tests/test_zoodata_page_arg.py
